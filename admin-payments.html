<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Telecommunication - Payments</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Additional styles specific to Payments page */

        .payments {
            padding: 20px;
        }

        .payments h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: #fff;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        tr:hover {background-color: #f5f5f5;}

        /* Responsive Design */
        @media (max-width: 768px) {
            table, thead, tbody, th, td, tr { 
                display: block; 
            }

            th {
                position: absolute;
                top: -9999px;
                left: -9999px;
            }

            tr { border: 1px solid #ccc; margin-bottom: 5px; }

            td { 
                border: none;
                border-bottom: 1px solid #eee; 
                position: relative;
                padding-left: 50%; 
            }

            td:before { 
                position: absolute;
                top: 12px;
                left: 12px;
                width: 45%; 
                padding-right: 10px; 
                white-space: nowrap;
                font-weight: bold;
            }

            /* Label the data */
            td:nth-of-type(1):before { content: "Payment ID"; }
            td:nth-of-type(2):before { content: "Amount"; }
            td:nth-of-type(3):before { content: "Date of Payment"; }
            td:nth-of-type(4):before { content: "Payment Method"; }
            td:nth-of-type(5):before { content: "Payment Status"; }
            td:nth-of-type(6):before { content: "Mobile Number"; }
            td:nth-of-type(7):before { content: "Account Type"; }
            td:nth-of-type(8):before { content: "Account Status"; }
            td:nth-of-type(9):before { content: "First Name"; }
            td:nth-of-type(10):before { content: "Last Name"; }
            td:nth-of-type(11):before { content: "Email"; }
        }
    </style>
</head>
<body>

  <!-- Header -->
  <header>
    <nav>
      <a href="admin-dashboard.html" class="logo">Telecommunication</a>
      <ul class="nav-links">
        <!-- Navigation links -->
        <li><a href="admin-dashboard.html">Dashboard</a></li>
        <!-- ... -->
      </ul>
    </nav>
  </header>

    <!-- Main Content -->
    <main>
        <section class="payments">
            <h1>All Payments and Their Initiated Accounts</h1>

            <table id="paymentsTable">
                <thead>
                    <tr>
                        <th>Payment ID</th>
                        <th>Amount</th>
                        <th>Date of Payment</th>
                        <th>Payment Method</th>
                        <th>Payment Status</th>
                        <th>Mobile Number</th>
                        <th>Account Type</th>
                        <th>Account Status</th>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Email</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Data Rows will be populated here -->
                </tbody>
            </table>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2023 Telecommunication</p>
    </footer>

    <!-- JavaScript for fetching data -->
    <script>
        // Fetch data from the backend
        fetch('process-list-payments.aspx', {
            method: 'GET',
        })
        .then(response => response.json())
        .then(data => {
            const tableBody = document.querySelector('#paymentsTable tbody');
            // Clear existing data
            tableBody.innerHTML = '';
            if (data.length > 0) {
                data.forEach(item => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${item.paymentID}</td>
                        <td>${item.amount}</td>
                        <td>${item.date_of_payment}</td>
                        <td>${item.payment_method}</td>
                        <td>${item.payment_status}</td>
                        <td>${item.mobileNo}</td>
                        <td>${item.account_type}</td>
                        <td>${item.account_status}</td>
                        <td>${item.first_name}</td>
                        <td>${item.last_name}</td>
                        <td>${item.email}</td>
                    `;
                    tableBody.appendChild(row);
                });
            } else {
                // No data found
                const row = document.createElement('tr');
                row.innerHTML = '<td colspan="11" style="text-align:center;">No records found.</td>';
                tableBody.appendChild(row);
            }
        })
        .catch(error => {
            console.error('Error fetching data:', error);
        });
    </script>
</body>
</html>
